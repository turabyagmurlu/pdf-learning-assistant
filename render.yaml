# Render Blueprint — backend API + worker + Redis
# DB (pgvector) -> Supabase/Neon; Storage -> Cloudflare R2/S3; AI -> OpenAI
# Bu dosya Render'da "New + Blueprint" ile repoyu bağlayınca otomatik okunur.
services:
  - type: web
    name: pdf-api
    runtime: docker
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: free
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false          # Supabase/Neon bağlantı dizesi
      - key: REDIS_URL
        fromService: { name: pdf-redis, type: redis, property: connectionString }
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: pdfs
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: EMBEDDING_DIM
        value: "768"
      - key: CORS_ORIGINS
        sync: false          # Vercel frontend URL'in
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

  - type: worker
    name: pdf-worker
    runtime: docker
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService: { name: pdf-redis, type: redis, property: connectionString }
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: pdfs
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: EMBEDDING_DIM
        value: "768"
    startCommand: celery -A app.workers.celery_app.celery worker --loglevel=info

  - type: redis
    name: pdf-redis
    plan: free
    ipAllowList: []
