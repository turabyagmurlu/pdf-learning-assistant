# Render Blueprint — tek ücretsiz web servisi (backend + arka plan ingest)
# DB (pgvector) -> Supabase | Storage -> Supabase S3 | AI -> Gemini (ücretsiz)
services:
  - type: web
    name: pdf-api
    runtime: docker
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: free
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: EMBEDDING_DIM
        value: "768"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: S3_ENDPOINT
        value: https://wjkifrkhuidevmyhtnio.storage.supabase.co/storage/v1/s3
      - key: S3_PUBLIC_ENDPOINT
        value: https://wjkifrkhuidevmyhtnio.storage.supabase.co/storage/v1/s3
      - key: S3_REGION
        value: eu-west-1
      - key: S3_BUCKET
        value: pdfs
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
